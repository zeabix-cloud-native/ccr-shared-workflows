name: Dependency-Track Scan (reusable)

on:
  workflow_call:
    inputs:
      solution-name:
        description: Filename of the .sln, e.g. BookingService.sln
        required: true
        type: string
      working-directory:
        description: Directory where the solution lives (used when autodetect is false)
        required: false
        type: string
        default: '.'
      autodetect-working-directory:
        description: If true, resolve solution at repo root or monorepo-package-path
        required: false
        type: boolean
        default: false
      monorepo-package-path:
        description: Second path to try when autodetect is true
        required: false
        type: string
        default: ''
      project-name:
        description: Dependency-Track project name (e.g. CCR-Booking-Service-DEV)
        required: true
        type: string
      project-version:
        description: DT project version label
        required: false
        type: string
        default: 'v1.0.0'
      is-latest:
        description: Mark this BOM as the project's latest version in DT
        required: false
        type: boolean
        default: true
      auto-create:
        description: Create the DT project if it does not exist
        required: false
        type: boolean
        default: true
      cyclonedx-spec-version:
        description: CycloneDX spec version to emit (DT 4.13 supports up to 1.6)
        required: false
        type: string
        default: '1.6'
      max-critical:
        description: Fail if Critical vulns > N. -1 = ignore (no gating)
        required: false
        type: number
        default: -1
      max-high:
        description: Fail if High vulns > N. -1 = ignore
        required: false
        type: number
        default: -1
      max-medium:
        description: Fail if Medium vulns > N. -1 = ignore
        required: false
        type: number
        default: -1
      max-low:
        description: Fail if Low vulns > N. -1 = ignore
        required: false
        type: number
        default: -1
      polling-timeout-seconds:
        description: Max time to wait for DT to finish processing the BOM (only used when gating)
        required: false
        type: number
        default: 180
      dotnet-version:
        description: .NET SDK version to install
        required: false
        type: string
        default: '10.x'
    secrets:
      DTRACK_API_URL:
        required: true
      DTRACK_API_KEY:
        required: true

jobs:
  dependency-track:
    name: Dependency-Track Scan (SCA)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Resolve working directory
        id: workdir
        run: |
          SLN="${{ inputs.solution-name }}"
          if [ "${{ inputs.autodetect-working-directory }}" != "true" ]; then
            echo "path=${{ inputs.working-directory }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -f "./${SLN}" ]; then
            echo "path=." >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.monorepo-package-path }}" ] && [ -f "${{ inputs.monorepo-package-path }}/${SLN}" ]; then
            echo "path=${{ inputs.monorepo-package-path }}" >> "$GITHUB_OUTPUT"
          else
            echo "Error: ${SLN} not found at ./${SLN} or ${{ inputs.monorepo-package-path }}/${SLN}"
            exit 1
          fi

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Cache NuGet packages
        uses: actions/cache@v4.2.2
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ inputs.project-name }}-${{ hashFiles(format('{0}/**/*.csproj', steps.workdir.outputs.path)) }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ inputs.project-name }}-
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        working-directory: ${{ steps.workdir.outputs.path }}
        run: dotnet restore ${{ inputs.solution-name }}

      - name: Cache CycloneDX tool
        id: cache-cyclonedx
        uses: actions/cache@v4.2.2
        with:
          path: ${{ runner.temp }}/cyclonedx-tools
          key: ${{ runner.os }}-cyclonedx-v1

      - name: Install CycloneDX SBOM tool
        if: steps.cache-cyclonedx.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${{ runner.temp }}/cyclonedx-tools"
          dotnet tool install CycloneDX --tool-path "${{ runner.temp }}/cyclonedx-tools"

      - name: Add CycloneDX to PATH
        run: echo "${{ runner.temp }}/cyclonedx-tools" >> $GITHUB_PATH

      - name: Generate CycloneDX SBOM
        working-directory: ${{ steps.workdir.outputs.path }}
        run: dotnet-CycloneDX ${{ inputs.solution-name }} -o . -fn bom.json -F Json -t -spv ${{ inputs.cyclonedx-spec-version }}

      - name: Sanity-check BOM
        working-directory: ${{ steps.workdir.outputs.path }}
        run: |
          test -s bom.json || { echo "bom.json is missing or empty"; exit 1; }
          ls -la bom.json
          head -c 400 bom.json && echo

      - name: Health check Dependency-Track API
        env:
          DT_URL: ${{ secrets.DTRACK_API_URL }}
        run: |
          if [ -z "${DT_URL}" ]; then
            echo "DTRACK_API_URL is not set."
            exit 1
          fi
          echo "Probing ${DT_URL}/api/version ..."
          curl -fsS --max-time 15 "${DT_URL}/api/version"
          echo

      - name: Upload BOM to Dependency-Track
        id: upload
        working-directory: ${{ steps.workdir.outputs.path }}
        env:
          DT_URL: ${{ secrets.DTRACK_API_URL }}
          DT_API_KEY: ${{ secrets.DTRACK_API_KEY }}
          DT_PROJECT_NAME: ${{ inputs.project-name }}
          DT_PROJECT_VERSION: ${{ inputs.project-version }}
          DT_AUTO_CREATE: ${{ inputs.auto-create }}
          DT_IS_LATEST: ${{ inputs.is-latest }}
        run: |
          set -euo pipefail
          if [ -z "${DT_URL}" ] || [ -z "${DT_API_KEY}" ]; then
            echo "DTRACK_API_URL and DTRACK_API_KEY must be set as repository secrets."
            exit 1
          fi
          response_file=$(mktemp)
          http_code=$(curl -sS -o "$response_file" -w '%{http_code}' \
            -X POST "${DT_URL}/api/v1/bom" \
            -H "X-Api-Key: ${DT_API_KEY}" \
            -F "autoCreate=${DT_AUTO_CREATE}" \
            -F "projectName=${DT_PROJECT_NAME}" \
            -F "projectVersion=${DT_PROJECT_VERSION}" \
            -F "isLatest=${DT_IS_LATEST}" \
            -F "bom=@bom.json")
          echo "HTTP ${http_code}"
          echo "--- Dependency-Track response ---"
          cat "$response_file"
          echo
          echo "---------------------------------"
          if [ "${http_code}" != "200" ]; then
            rm -f "$response_file"
            exit 1
          fi
          token=$(jq -r .token < "$response_file")
          rm -f "$response_file"
          echo "token=${token}" >> "$GITHUB_OUTPUT"

      - name: Enforce severity thresholds
        if: inputs.max-critical != -1 || inputs.max-high != -1 || inputs.max-medium != -1 || inputs.max-low != -1
        env:
          DT_URL: ${{ secrets.DTRACK_API_URL }}
          DT_API_KEY: ${{ secrets.DTRACK_API_KEY }}
          DT_PROJECT_NAME: ${{ inputs.project-name }}
          DT_PROJECT_VERSION: ${{ inputs.project-version }}
          DT_TOKEN: ${{ steps.upload.outputs.token }}
          POLL_TIMEOUT: ${{ inputs.polling-timeout-seconds }}
          MAX_CRITICAL: ${{ inputs.max-critical }}
          MAX_HIGH: ${{ inputs.max-high }}
          MAX_MEDIUM: ${{ inputs.max-medium }}
          MAX_LOW: ${{ inputs.max-low }}
        run: |
          set -euo pipefail

          echo "==> Waiting for Dependency-Track to finish processing the BOM (timeout: ${POLL_TIMEOUT}s)"
          deadline=$(( $(date +%s) + POLL_TIMEOUT ))
          while :; do
            processing=$(curl -sS -H "X-Api-Key: ${DT_API_KEY}" \
              "${DT_URL}/api/v1/bom/token/${DT_TOKEN}" | jq -r .processing)
            if [ "${processing}" = "false" ]; then
              echo "Processing complete."
              break
            fi
            if [ "$(date +%s)" -ge "${deadline}" ]; then
              echo "Timed out after ${POLL_TIMEOUT}s waiting for DT to process the BOM."
              exit 1
            fi
            sleep 5
          done

          echo "==> Looking up project UUID"
          uuid=$(curl -sS -H "X-Api-Key: ${DT_API_KEY}" \
            --get \
            --data-urlencode "name=${DT_PROJECT_NAME}" \
            --data-urlencode "version=${DT_PROJECT_VERSION}" \
            "${DT_URL}/api/v1/project/lookup" | jq -r .uuid)
          echo "Project UUID: ${uuid}"

          echo "==> Fetching current metrics"
          metrics=$(curl -sS -H "X-Api-Key: ${DT_API_KEY}" \
            "${DT_URL}/api/v1/metrics/project/${uuid}/current")
          echo "${metrics}" | jq '{critical, high, medium, low, unassigned, vulnerabilities, components, policyViolationsFail}'

          crit=$(echo "${metrics}" | jq -r '.critical // 0')
          high=$(echo "${metrics}" | jq -r '.high // 0')
          med=$(echo  "${metrics}" | jq -r '.medium // 0')
          low=$(echo  "${metrics}" | jq -r '.low // 0')

          echo "Severity counts — Critical:${crit} High:${high} Medium:${med} Low:${low}"
          echo "Thresholds       — Critical<=${MAX_CRITICAL} High<=${MAX_HIGH} Medium<=${MAX_MEDIUM} Low<=${MAX_LOW} (-1 = ignore)"

          fail=0
          [ "${MAX_CRITICAL}" -ge 0 ] && [ "${crit}" -gt "${MAX_CRITICAL}" ] && { echo "Critical exceeds threshold"; fail=1; }
          [ "${MAX_HIGH}"     -ge 0 ] && [ "${high}" -gt "${MAX_HIGH}" ]     && { echo "High exceeds threshold";     fail=1; }
          [ "${MAX_MEDIUM}"   -ge 0 ] && [ "${med}"  -gt "${MAX_MEDIUM}" ]   && { echo "Medium exceeds threshold";   fail=1; }
          [ "${MAX_LOW}"      -ge 0 ] && [ "${low}"  -gt "${MAX_LOW}" ]      && { echo "Low exceeds threshold";      fail=1; }
          if [ "${fail}" -eq 0 ]; then
            echo "All severity thresholds passed."
          fi
          exit ${fail}
