name: SonarCloud Scan — npm / TypeScript (reusable)

# Aligned with SonarCloud JS/TS setup guide:
#   actions/checkout (full clone) + SonarSource/sonarqube-scan-action
# No actions/cache — not required for JS/TS SAST and avoids deprecated cache versions.

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory containing package.json (when autodetect is false)
        required: false
        type: string
        default: '.'
      autodetect-working-directory:
        description: If true, use package.json at repo root, else monorepo-package-path
        required: false
        type: boolean
        default: false
      monorepo-package-path:
        description: Path to the app when autodetect is true and root has no package.json
        required: false
        type: string
        default: 'application_service/ccr-frontend-backoffice'
      install-dependencies:
        description: Run npm ci/install before scan (optional; SonarCloud JS guide does not require it)
        required: false
        type: boolean
        default: false
      node-version:
        required: false
        type: string
        default: '22.x'
      npm-install-mode:
        description: install or ci (ci requires package-lock.json)
        required: false
        type: string
        default: 'ci'
      sonar-project-key:
        description: SonarCloud project key
        required: true
        type: string
      sonar-organization:
        description: SonarCloud organization key
        required: true
        type: string
      sonar-project-name:
        description: Display name shown in SonarCloud UI
        required: true
        type: string
      sonar-host-url:
        description: Override only for self-hosted SonarQube
        required: false
        type: string
        default: 'https://sonarcloud.io'
      sonar-sources:
        description: Comma-separated source roots relative to the app directory
        required: false
        type: string
        default: 'app,components,lib,config,contexts,hooks,providers,utils,styles'
      sonar-exclusions:
        description: Comma-separated exclusion globs relative to the app directory
        required: false
        type: string
        default: '**/node_modules/**,**/.next/**,**/coverage/**,**/public/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx'
      sonar-tsconfig-path:
        description: Path to tsconfig.json relative to the app directory
        required: false
        type: string
        default: 'tsconfig.json'
      run-tests-with-coverage:
        description: If true, run test-command before scan and upload lcov coverage
        required: false
        type: boolean
        default: false
      test-command:
        description: Shell command to run tests with coverage (app working directory)
        required: false
        type: string
        default: 'npm test -- --coverage --coverageReporters=lcov'
      coverage-report-path:
        description: LCOV report path relative to the app directory
        required: false
        type: string
        default: 'coverage/lcov.info'
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  sonarqube:
    name: SonarCloud Scan (npm SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Determine working directory
        id: workdir
        run: |
          if [ "${{ inputs.autodetect-working-directory }}" = "true" ]; then
            if [ -f "package.json" ]; then
              echo "path=." >> "$GITHUB_OUTPUT"
              echo "Using repo root (package.json at root)"
            elif [ -f "${{ inputs.monorepo-package-path }}/package.json" ]; then
              echo "path=${{ inputs.monorepo-package-path }}" >> "$GITHUB_OUTPUT"
              echo "Using ${{ inputs.monorepo-package-path }}"
            else
              echo "Error: package.json not found at root or under ${{ inputs.monorepo-package-path }}"
              exit 1
            fi
          else
            if [ ! -f "${{ inputs.working-directory }}/package.json" ]; then
              echo "Error: no package.json under ${{ inputs.working-directory }}"
              exit 1
            fi
            echo "path=${{ inputs.working-directory }}" >> "$GITHUB_OUTPUT"
            echo "Using ${{ inputs.working-directory }}"
          fi

      - name: Set up Node.js
        if: ${{ inputs.install-dependencies || inputs.run-tests-with-coverage }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        if: ${{ inputs.install-dependencies || inputs.run-tests-with-coverage }}
        working-directory: ${{ steps.workdir.outputs.path }}
        run: |
          if [ "${{ inputs.npm-install-mode }}" = "ci" ]; then
            npm ci
          else
            npm install
          fi

      - name: Run tests with coverage
        if: ${{ inputs.run-tests-with-coverage }}
        working-directory: ${{ steps.workdir.outputs.path }}
        run: ${{ inputs.test-command }}

      # Properties file avoids shell splitting when projectName contains spaces.
      - name: Write sonar-project.properties
        working-directory: ${{ steps.workdir.outputs.path }}
        env:
          SONAR_PROJECT_KEY: ${{ inputs.sonar-project-key }}
          SONAR_ORGANIZATION: ${{ inputs.sonar-organization }}
          SONAR_PROJECT_NAME: ${{ inputs.sonar-project-name }}
          SONAR_HOST_URL: ${{ inputs.sonar-host-url }}
          SONAR_SOURCES: ${{ inputs.sonar-sources }}
          SONAR_EXCLUSIONS: ${{ inputs.sonar-exclusions }}
          SONAR_TSCONFIG: ${{ inputs.sonar-tsconfig-path }}
          SONAR_COVERAGE_PATH: ${{ inputs.coverage-report-path }}
          RUN_COVERAGE: ${{ inputs.run-tests-with-coverage }}
        run: |
          cat > sonar-project.properties <<EOF
          sonar.projectKey=${SONAR_PROJECT_KEY}
          sonar.organization=${SONAR_ORGANIZATION}
          sonar.projectName=${SONAR_PROJECT_NAME}
          sonar.host.url=${SONAR_HOST_URL}
          sonar.sources=${SONAR_SOURCES}
          sonar.exclusions=${SONAR_EXCLUSIONS}
          sonar.typescript.tsconfigPath=${SONAR_TSCONFIG}
          EOF
          if [ "${RUN_COVERAGE}" = "true" ]; then
            echo "sonar.javascript.lcov.reportPaths=${SONAR_COVERAGE_PATH}" >> sonar-project.properties
          fi
          echo "=== sonar-project.properties ==="
          cat sonar-project.properties

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ${{ steps.workdir.outputs.path }}
