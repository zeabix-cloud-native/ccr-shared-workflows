name: Azure Web App Deploy (reusable)

on:
  workflow_call:
    inputs:
      app-name:
        description: Azure Web App name to deploy to (e.g. app-booking-wccr-nonprod-sea-01)
        required: true
        type: string
      slot-name:
        description: Deployment slot
        required: false
        type: string
        default: 'Production'
      artifact-name:
        description: Name of the artifact uploaded by the build job
        required: false
        type: string
        default: '.net-app'
      package-path:
        description: Path passed to azure/webapps-deploy
        required: false
        type: string
        default: '.'
      extract-tarball:
        description: If true, extract tarball before deploy (Next.js standalone flow)
        required: false
        type: boolean
        default: false
      tarball-filename:
        description: Tarball filename inside the downloaded artifact directory
        required: false
        type: string
        default: 'deploy.tar.gz'
      verify-next-standalone:
        description: After extract, list .next and print BUILD_ID (Next.js sanity check)
        required: false
        type: boolean
        default: false
    secrets:
      AZURE_PUBLISH_PROFILE:
        description: Publish profile XML from Azure App Service
        required: true

jobs:
  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}

      - name: Extract deployment tarball
        if: ${{ inputs.extract-tarball }}
        run: tar -xzf ${{ inputs.tarball-filename }}

      - name: Verify Next.js standalone output
        if: ${{ inputs.extract-tarball && inputs.verify-next-standalone }}
        run: |
          echo "=== Extracted files ==="
          ls -la
          echo ""
          echo "=== Checking .next directory ==="
          ls -la .next/
          echo ""
          echo "=== Verifying BUILD_ID ==="
          cat .next/BUILD_ID

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ inputs.app-name }}
          slot-name: ${{ inputs.slot-name }}
          package: ${{ inputs.package-path }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
