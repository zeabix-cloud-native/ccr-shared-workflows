name: SonarCloud Scan (reusable)

on:
  workflow_call:
    inputs:
      solution-name:
        description: Filename of the .sln, e.g. BookingService.sln
        required: true
        type: string
      working-directory:
        description: Directory where the solution lives (used when autodetect is false)
        required: false
        type: string
        default: '.'
      autodetect-working-directory:
        description: If true, resolve solution at repo root or monorepo-package-path
        required: false
        type: boolean
        default: false
      monorepo-package-path:
        description: Second path to try when autodetect is true
        required: false
        type: string
        default: ''
      sonar-project-key:
        description: SonarCloud project key
        required: true
        type: string
      sonar-organization:
        description: SonarCloud organization key
        required: true
        type: string
      sonar-project-name:
        description: Display name shown in SonarCloud UI
        required: true
        type: string
      sonar-host-url:
        description: Override only for self-hosted SonarQube
        required: false
        type: string
        default: 'https://sonarcloud.io'
      dotnet-version:
        description: .NET SDK version to install
        required: false
        type: string
        default: '10.x'
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  sonarqube:
    name: SonarCloud Scan (SAST + Coverage)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve working directory
        id: workdir
        run: |
          SLN="${{ inputs.solution-name }}"
          if [ "${{ inputs.autodetect-working-directory }}" != "true" ]; then
            echo "path=${{ inputs.working-directory }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -f "./${SLN}" ]; then
            echo "path=." >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.monorepo-package-path }}" ] && [ -f "${{ inputs.monorepo-package-path }}/${SLN}" ]; then
            echo "path=${{ inputs.monorepo-package-path }}" >> "$GITHUB_OUTPUT"
          else
            echo "Error: ${SLN} not found at ./${SLN} or ${{ inputs.monorepo-package-path }}/${SLN}"
            exit 1
          fi

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          # Bump suffix when analyzer downloads fail with "Plugin resource not found"
          key: ${{ runner.os }}-sonar-v2-${{ inputs.sonar-project-key }}
          restore-keys: |
            ${{ runner.os }}-sonar-v2-${{ inputs.sonar-project-key }}-
            ${{ runner.os }}-sonar-v2-

      - name: Cache SonarScanner and dotnet-coverage
        id: cache-sonar-tools
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/dotnet-sonar-tools
          key: ${{ runner.os }}-dotnet-sonar-tools-v2

      - name: Install SonarScanner and dotnet-coverage
        if: steps.cache-sonar-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${{ runner.temp }}/dotnet-sonar-tools"
          dotnet tool install dotnet-sonarscanner --version 11.2.1 --tool-path "${{ runner.temp }}/dotnet-sonar-tools"
          dotnet tool install dotnet-coverage    --tool-path "${{ runner.temp }}/dotnet-sonar-tools"

      - name: Add analysis tools to PATH
        run: echo "${{ runner.temp }}/dotnet-sonar-tools" >> $GITHUB_PATH

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ inputs.sonar-project-key }}-${{ hashFiles(format('{0}/**/*.csproj', steps.workdir.outputs.path)) }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ inputs.sonar-project-key }}-
            ${{ runner.os }}-nuget-

      - name: Begin SonarCloud analysis
        working-directory: ${{ steps.workdir.outputs.path }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          begin_args=(
            /k:"${{ inputs.sonar-project-key }}"
            /o:"${{ inputs.sonar-organization }}"
            /n:"${{ inputs.sonar-project-name }}"
            /v:"${GITHUB_SHA}"
            /d:sonar.host.url="${{ inputs.sonar-host-url }}"
            /d:sonar.token="${SONAR_TOKEN}"
            /d:sonar.branch.name="${GITHUB_REF_NAME}"
            /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml
            /d:sonar.ws.timeout=180
          )

          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "dotnet-sonarscanner begin (attempt ${attempt}/${max_attempts})"
            if dotnet-sonarscanner begin "${begin_args[@]}"; then
              exit 0
            fi
            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "SonarCloud begin failed after ${max_attempts} attempts"
              exit 1
            fi
            echo "Clearing Sonar caches and retrying in 15s..."
            rm -rf ~/.sonar/cache ~/.sonarqube "${{ runner.temp }}/.sonarqube"
            sleep 15
          done

      - name: Build
        working-directory: ${{ steps.workdir.outputs.path }}
        run: dotnet build ${{ inputs.solution-name }} --configuration Release --no-incremental

      - name: Test with coverage (dotnet-coverage → VS Code Coverage XML)
        working-directory: ${{ steps.workdir.outputs.path }}
        run: dotnet-coverage collect "dotnet test ${{ inputs.solution-name }} --configuration Release --no-build" -f xml -o coverage.xml

      - name: End SonarCloud analysis
        working-directory: ${{ steps.workdir.outputs.path }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet-sonarscanner end /d:sonar.token="${SONAR_TOKEN}"
